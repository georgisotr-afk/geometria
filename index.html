<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Геометрия в Ежедневието</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
--bg: #050508;
--gold: #FFD700;
--cyan: #00F5FF;
--magenta: #FF006E;
--white: #F0F0FF;
--text: #c8c8e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(--bg);
color: var(--white);
font-family: 'Inter', sans-serif;
overflow-x: hidden;
cursor: none;
}

/* CUSTOM CURSOR */
.cursor { position: fixed; width: 20px; height: 20px; border: 2px solid var(--cyan); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.1s ease; mix-blend-mode: difference; }
.cursor-dot { position: fixed; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; }

/* PAGES */
.page { min-height: 100vh; display: none; flex-direction: column; position: relative; overflow: hidden; background: var(--bg); }
.page.active { display: flex; }
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

/* REUSABLE COMPONENTS */
.tag { display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 4px; color: var(--cyan); border: 1px solid rgba(0,245,255,0.3); padding: 6px 16px; border-radius: 20px; margin-bottom: 2rem; text-transform: uppercase; }
.btn { display: inline-flex; align-items: center; gap: 10px; font-family: 'Unbounded', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 16px 36px; border: none; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; }
.btn-primary { background: linear-gradient(135deg, var(--gold), #ff9500); color: #000; }

/* PAGE 1 STYLES */
#page1 { align-items: center; justify-content: center; text-align: center; padding: 2rem; }
h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(2.5rem, 7vw, 5.5rem); font-weight: 900; letter-spacing: -2px; }
.highlight { background: linear-gradient(135deg, var(--gold), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* PAGE 2 STYLES */
#page2 { padding: 4rem 2rem; align-items: center; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; max-width: 900px; width: 100%; margin-top: 3rem; }
.card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.8rem; }

/* PAGE 3 STYLES */
#page3 { padding: 3rem 2rem; align-items: center; }
.fractal-container { width: 100%; max-width: 900px; }

/* NAV */
.nav-back { position: fixed; top: 1.5rem; left: 1.5rem; color: rgba(255,255,255,0.4); cursor: pointer; z-index: 1000; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); display: none; }
.nav-back.visible { display: flex; }
.page-indicator { position: fixed; bottom: 1.5rem; right: 1.5rem; color: rgba(255,255,255,0.2); font-family: 'Space Mono', monospace; z-index: 1000; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>
<canvas class="stars" id="stars"></canvas>
<div class="nav-back" id="navBack" onclick="goBack()">← Назад</div>
<div class="page-indicator" id="pageIndicator">01 / 03</div>

<div class="page active" id="page1">
<div class="hero-content">
<div class="tag">⬡ STEAM Проект</div>
<h1><span class="highlight">Геометрия</span><br>в Ежедневието</h1>
<button class="btn btn-primary" onclick="goToPage(2)">Открий я</button>
</div>
</div>

<div class="page" id="page2">
<h2>Златното сечение</h2>
<div class="cards-grid">
<div class="card"><h3>Слънчоглед</h3><p>Семената следват числата на Фибоначи.</p></div>
<div class="card"><h3>Човешко лице</h3><p>Пропорции, близки до φ, ни се струват красиви.</p></div>
</div>
<button class="btn btn-primary" style="margin-top:2rem;" onclick="goToPage(3)">Към Фракталите</button>
</div>

<div class="page" id="page3">
<h2>Фрактали</h2>
<div class="fractal-container">
<canvas id="sierpinskiCanvas" style="width:100%; height:400px; border:1px solid #333;"></canvas>
</div>
</div>

<script>
// Navigation
function goToPage(n) {
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.getElementById('page' + n).classList.add('active');
document.getElementById('pageIndicator').textContent = '0' + n + ' / 03';
document.getElementById('navBack').style.display = n > 1 ? 'flex' : 'none';
if(n === 3) initSierpinski();
}

function goBack() {
const current = parseInt(document.getElementById('pageIndicator').textContent);
if(current > 1) goToPage(current - 1);
}

// Cursor
document.addEventListener('mousemove', e => {
document.getElementById('cursor').style.left = e.clientX - 10 + 'px';
document.getElementById('cursor').style.top = e.clientY - 10 + 'px';
document.getElementById('cursorDot').style.left = e.clientX - 3 + 'px';
document.getElementById('cursorDot').style.top = e.clientY - 3 + 'px';
});

// Stars
const sCtx = document.getElementById('stars').getContext('2d');
function drawStars() {
sCtx.fillStyle = 'white';
sCtx.fillRect(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 1, 1);
requestAnimationFrame(drawStars);
}
// drawStars(); // Ракоментирай, ако искаш анимация

// Sierpinski Basic
function initSierpinski() {
const canvas = document.getElementById('sierpinskiCanvas');
const ctx = canvas.getContext('2d');
ctx.fillStyle = "white";
// Прост триъгълник за демонстрация
ctx.beginPath();
ctx.moveTo(200, 50); ctx.lineTo(50, 350); ctx.lineTo(350, 350); ctx.closePath();
ctx.stroke();
}
</script>

</body>
</html>
